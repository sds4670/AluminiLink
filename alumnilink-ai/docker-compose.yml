version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: alumnilink_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alumnilink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alumnilink_secret}
      POSTGRES_DB: ${POSTGRES_DB:-alumnilink_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alumnilink}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alumnilink_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alumnilink_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-alumnilink}:${POSTGRES_PASSWORD:-alumnilink_secret}@postgres:5432/${POSTGRES_DB:-alumnilink_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_prod}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alumnilink_celery
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-alumnilink}:${POSTGRES_PASSWORD:-alumnilink_secret}@postgres:5432/${POSTGRES_DB:-alumnilink_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_prod}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info -Q celery,screening,windows,reminders

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alumnilink_frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
